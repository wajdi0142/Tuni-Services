<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ajouter Fast Food - Tuni-Services</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
</head>
<body class="bg-light">

  <div class="container py-5">
    <div class="card shadow-lg p-4">
      <h3 class="text-center mb-4">Ajouter un Fast Food</h3>
      <form>
        <div class="mb-3">
          <label>Nom du restaurant</label>
          <input type="text" class="form-control" placeholder="Burger King" required />
        </div>
        <div class="mb-3">
          <label>Gouvernorat</label>
          <select class="form-select">
            <option>Monastir</option>
            <option>Sousse</option>
          </select>
        </div>
        <div class="mb-3">
          <label>Ville</label>
          <input type="text" class="form-control" placeholder="Sahloul" />
        </div>
        <div class="mb-3">
          <label>Prix moyen (DT)</label>
          <input type="number" class="form-control" value="18" />
        </div>
        <div class="mb-3">
          <label>Menu (6 lignes max)</label>
          <textarea class="form-control" rows="6" placeholder="Burger + Frites = 15 DT&#10;..."></textarea>
        </div>
        <button type="submit" class="btn btn-success w-100 rounded-pill">Publier</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

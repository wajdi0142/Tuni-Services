<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connexion - Tuni-Services</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="video-overlay"></div>
  <video autoplay muted loop id="bg-video" playsinline>
    <source src="../assets/video/earth.mp4" type="video/mp4" />
  </video>

  <div class="container py-5 d-flex align-items-center" style="min-height: 100vh;">
    <div class="row justify-content-center w-100">
      <div class="col-md-6 col-lg-5 col-xl-4">
        <div class="card shadow-lg p-4" style="border-radius: 20px; backdrop-filter: blur(12px);">
          <div class="text-center mb-4">
            <img src="../assets/img/logo.png" alt="Logo" class="logo float" height="60" />
            <h3 class="mt-3 fw-bold text-white">Connexion Fournisseur</h3>
          </div>

          <form id="loginForm" novalidate>
            <div class="mb-3">
              <label class="form-label text-white">Email</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                <input type="email" id="email" class="form-control" placeholder="exemple@domaine.com" required />
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label text-white">Mot de passe</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" id="password" class="form-control" minlength="6" required />
                <button type="button" class="btn btn-outline-secondary" id="togglePassword">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>

            <div class="d-grid mb-3">
              <button type="submit" class="btn btn-success btn-lg rounded-pill">
                <span class="spinner-border spinner-border-sm d-none" id="loading"></span>
                Se connecter
              </button>
            </div>

            <!-- BOUTONS ORGANISÉS ICI -->
            <div class="text-center">
              <a href="#" class="text-decoration-none text-muted small d-block mb-2" data-bs-toggle="modal" data-bs-target="#signupModal">
                Créer un compte
              </a>
              <a href="../index.html" class="btn btn-outline-light btn-sm rounded-pill px-4">
                <i class="fas fa-home"></i> Retour à l'accueil
              </a>
            </div>
            <!-- FIN DES BOUTONS -->

          </form>

          <!-- Toast -->
          <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;">
            <div id="loginToast" class="toast align-items-center text-white bg-success border-0" role="alert">
              <div class="d-flex">
                <div class="toast-body">Connexion réussie ! Redirection...</div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Inscription -->
  <div class="modal fade" id="signupModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark text-white" style="border-radius: 16px;">
        <div class="modal-header border-0">
          <h5 class="modal-title">Créer un compte</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="registerForm">
            <div class="mb-3">
              <input type="text" class="form-control" placeholder="Nom complet" id="regName" required />
            </div>
            <div class="mb-3">
              <input type="email" class="form-control" placeholder="Email" id="regEmail" required />
            </div>
            <div class="mb-3">
              <input type="text" class="form-control" placeholder="Téléphone" id="regPhone" />
            </div>
            <div class="mb-3">
              <input type="password" class="form-control" placeholder="Mot de passe (6+)" id="regPassword" minlength="6" required />
            </div>
            <button type="submit" class="btn btn-primary w-100 rounded-pill">S'inscrire</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- SÉCURITÉ ANTI-RETOUR -->
  <script>
  document.addEventListener("DOMContentLoaded", () => {
    fetch("../api/check-session.php")
      .then(res => res.json())
      .then(data => {
        if (data.loggedIn) {
          window.location.href = "dashboard.php";
        }
      });
  });

  // Bloque le retour en arrière
  if (performance.navigation.type === 2) {
    window.location.href = "login.html";
  }

  window.addEventListener('pageshow', function(event) {
    if (event.persisted) {
      window.location.reload();
    }
  });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/script.js"></script>
</body>
</html>

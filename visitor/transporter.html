<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Transporteur - Tuni-Services</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body class="bg-light">

  <video autoplay muted loop id="bg-video" class="position-fixed top-0 start-0 w-100 h-100 object-fit-cover" style="z-index: -1;">
    <source src="../assets/video/earth.mp4" type="video/mp4" />
  </video>

  <header class="bg-dark bg-opacity-75 text-white py-3 shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center gap-3">
        <img src="../assets/img/logo.png" alt="Logo" height="50" />
        <h1 class="h4 mb-0 fw-bold">Tuni-Services</h1>
      </div>
      <nav class="d-flex gap-3 align-items-center">
        <a href="../index.html" class="text-white"><i class="fas fa-home"></i> Accueil</a>
        <button id="theme-toggle" class="btn btn-outline-light btn-sm">
          <i class="fas fa-moon"></i>
        </button>
      </nav>
    </div>
  </header>

  <div class="container my-5">
    <div class="row">
      <div class="col-lg-3 mb-4">
        <div class="card shadow-sm border-0">
          <div class="card-header bg-primary text-white">
            <h5 class="mb-0"><i class="fas fa-list"></i> Catégories</h5>
          </div>
          <ul class="list-group list-group-flush">
            <a href="fast-food.html" class="list-group-item">Fast Food</a>
            <li class="list-group-item active bg-primary text-white">Transporteur</li>
            <a href="towing.html" class="list-group-item">Dépanneuse</a>
            <a href="furniture.html" class="list-group-item">Espaces Meubles</a>
            <a href="taxi.html" class="list-group-item">Taxi</a>
          </ul>
        </div>
      </div>

      <div class="col-lg-9">
        <div class="card shadow-sm p-4 mb-4">
          <h3 class="text-center mb-4 text-primary">Rechercher un Transporteur</h3>
          <form id="searchForm">
            <div class="row g-3">
              <div class="col-md-3">
                <label class="form-label">Gouvernorat</label>
                <select id="stateSelect" class="form-select">
                  <option value="">...</option>
                  <option value="Monastir">Monastir</option>
                  <option value="Sousse">Sousse</option>
                  <option value="Mahdia">Mahdia</option>
                  <option value="Sfax">Sfax</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label">Ville</label>
                <select id="citySelect" class="form-select">
                  <option value="">...</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label">Type</label>
                <select class="form-select">
                  <option>Camion</option>
                  <option>Fourgon</option>
                  <option>Moto</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label">Prix</label>
                <select class="form-select">
                  <option>20-50 DT</option>
                  <option>50-100 DT</option>
                </select>
              </div>
              <div class="col-12 text-center mt-3">
                <button type="submit" class="btn btn-success btn-lg px-5 rounded-pill">Rechercher</button>
              </div>
            </div>
          </form>
        </div>

        <div id="results" class="row g-4"></div>
      </div>
    </div>
  </div>

  <footer class="bg-dark text-white py-4 mt-5">
    <div class="container text-center">
      <p><i class="fas fa-map-marker-alt"></i> Menzel Ennour 5022, Monastir, Tunisie</p>
      <p><i class="fas fa-phone"></i> +216 99 177 795</p>
      <p><i class="fas fa-envelope"></i> elarbiwajdi8@gmail.com</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/script.js"></script>
</body>
</html>
